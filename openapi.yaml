openapi: 3.1.0
info:
  title: Buyer Email Collector API
  version: 1.0.0

servers:
  - url: https://YOUR_RENDER_URL

paths:
  /extract-emails:
    post:
      operationId: extractEmails
      summary: Extract emails from domains
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                domains:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Success
