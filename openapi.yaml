openapi: 3.1.0

info:
  title: Buyer Email API
  version: 1.0.0
  description: API for searching companies and extracting emails

servers:
  - url: https://buyer-email-action.onrender.com

paths:
  /:
    get:
      operationId: home_get
      summary: Home
      responses:
        "200":
          description: Successful response

  /search-and-extract-emails:
    post:
      operationId: search_and_extract_emails
      summary: Search and extract emails
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - query
              properties:
                query:
                  type: string
                pages:
                  type: integer
                  default: 3
                country:
                  type: string
                  default: nz
                language:
                  type: string
                  default: en

      responses:
        "200":
          description: Success

  /extract-emails:
    post:
      operationId: extract_emails
      summary: Extract emails from URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - url
              properties:
                url:
                  type: string

      responses:
        "200":
          description: Success

  /download/{filename}:
    get:
      operationId: download_file
      summary: Download CSV file
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string

      responses:
        "200":
          description: File download
